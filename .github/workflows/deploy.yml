# Production deploy: every merge to main ships hosting + Firestore rules +
# Storage rules, exactly like a local `firebase deploy` (the hosting predeploy
# hook in firebase.json runs the production build).
#
# One-time setup (see README): add the FIREBASE_SERVICE_ACCOUNT secret and the
# six VITE_FIREBASE_* repository variables. Until then this workflow skips
# quietly instead of failing.
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Never run two production deploys at once; queue instead of cancelling so
# the newest merge always ships last.
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID }}
      # Admin console email allow-list. Baked into the client bundle at build
      # time — without it the admin gate compares against `undefined` and locks
      # everyone out. Optional: an admin whose account carries the Firebase
      # `admin: true` custom claim gets in regardless. Set the VITE_ADMIN_EMAIL
      # repository *variable* to the owner's login email.
      VITE_ADMIN_EMAIL: ${{ vars.VITE_ADMIN_EMAIL }}
    steps:
      - name: Check configuration
        id: config
        env:
          SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$SA" ] || [ -z "$VITE_FIREBASE_PROJECT_ID" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::FIREBASE_SERVICE_ACCOUNT secret / VITE_FIREBASE_* variables not set — skipping production deploy."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.config.outputs.configured == 'true'
      - uses: actions/setup-node@v4
        if: steps.config.outputs.configured == 'true'
        with:
          node-version: 22
          cache: npm
      - run: npm ci
        if: steps.config.outputs.configured == 'true'

      - name: Deploy hosting + Firestore rules + Storage rules
        if: steps.config.outputs.configured == 'true'
        env:
          SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          printf '%s' "$SA" > "$RUNNER_TEMP/firebase-sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/firebase-sa.json"
          npx firebase-tools@14 deploy \
            --only hosting,firestore:rules,storage \
            --project "$VITE_FIREBASE_PROJECT_ID" \
            --non-interactive --force
